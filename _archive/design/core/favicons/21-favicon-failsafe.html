let state = 0;
function update() {
    ctx.clearRect(0, 0, 32, 32);
    if (state === 0) {
        ctx.fillStyle = '#35D687';
        ctx.fillRect(0, 0, 32, 32);
        if (imgBlack.complete) {
            const w = 26, h = (imgBlack.height / imgBlack.width) * w;
            ctx.drawImage(imgBlack, 16 - w/2, 16 - h/2, w, h);
        }
    } else {
        ctx.fillStyle = '#080808';
        ctx.fillRect(0, 0, 32, 32);
        if (imgWhite.complete) {
            const w = 24, h = (imgWhite.height / imgWhite.width) * w;
            ctx.drawImage(imgWhite, 16 - w/2, 16 - h/2, w, h);
        }
    }
    favicon.href = canvas.toDataURL('image/png');
    pCtx.drawImage(canvas, 0, 0, 128, 128);
    state = (state + 1) % 2;
}

window.onload = () => {
    setInterval(update, 1000);
    update();
};
